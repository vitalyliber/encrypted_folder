manifestVersion: 1
id: vitalyliber-encrypted-folder
category: files
name: Encrypted Folder
version: "0.1.2"
tagline: Browse and manage encrypted folders
description: >-
  Encrypted Folder lets you create gocryptfs encrypted vaults, unlock them into
  a folder visible to Umbrel File Browser, and browse images with a built-in
  gallery. Files are stored encrypted while locked, and unlocked folders are
  cleaned on startup for safety.
developer: Vitaly Liber
website: https://github.com/vitalyliber/encrypted_folder
repo: https://github.com/vitalyliber/encrypted_folder
support: https://github.com/vitalyliber/encrypted_folder/issues
port: 3000
gallery: []
path: "/"
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions: []
icon: "https://raw.githubusercontent.com/vitalyliber/encrypted_folder/main/vitalyliber-encrypted-folder/icon.svg"
releaseNotes: >-
  Moves unlocked folders into Home and adds Umbrel Files links.

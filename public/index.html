<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Encrypted Folder</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="https://unpkg.com/photoswipe@5/dist/photoswipe.css" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 32px auto; padding: 0 18px; background:#10131a; color:#eef2ff; }
    a { color: inherit; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
    .card { background:#171b25; border:1px solid #2a3142; border-radius:8px; padding:18px; margin:16px 0; }
    input { padding:10px; border-radius:10px; border:1px solid #394153; background:#0e1118; color:#fff; margin:4px; }
    button, .button { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 14px; border-radius:10px; border:0; cursor:pointer; margin:4px; text-decoration:none; font:inherit; }
    .password-field { display:inline-flex; align-items:center; width:176px; border:1px solid #394153; border-radius:10px; background:#0e1118; margin:4px; vertical-align:middle; }
    .password-field input { min-width:0; flex:1; width:100%; border:0; margin:0; padding-right:4px; }
    .icon-button { flex:0 0 auto; background:transparent; color:#aab2c5; padding:8px; line-height:0; margin:0; }
    .icon-button svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .primary { background:#7c3aed; color:white; }
    .secondary { background:#273044; color:#eef2ff; }
    .danger { background:#ef4444; color:white; }
    code { background:#0e1118; padding:2px 6px; border-radius:6px; }
    .muted { color:#aab2c5; } .ok { color:#86efac; } .bad { color:#fca5a5; }
    .hidden { display:none; }
    .pathbar { display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin:10px 0 18px; }
    .pathbar button { margin:0; padding:7px 10px; background:#20283a; color:#eef2ff; }
    .browser-controls { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin:0 0 18px; }
    .pswp__slideshow-controls { position:absolute; left:50%; bottom:22px; transform:translateX(-50%); z-index:10000; display:flex; align-items:center; gap:8px; padding:8px; border-radius:12px; background:rgba(16,19,26,.84); color:#eef2ff; backdrop-filter:blur(10px); }
    .pswp__slideshow-controls select { background:#0e1118; color:#eef2ff; border:1px solid #394153; border-radius:10px; padding:9px; }
    .pswp__slideshow-controls button { margin:0; background:#7c3aed; color:white; }
    .browser-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:12px; }
    .entry { position:relative; min-height:138px; border:1px solid #2a3142; border-radius:8px; background:#151a24; color:#eef2ff; overflow:hidden; text-align:left; }
    .entry button, .entry a { width:100%; height:100%; min-height:138px; padding:0; margin:0; background:transparent; color:inherit; border:0; text-decoration:none; cursor:pointer; display:flex; flex-direction:column; }
    .entry .play-from { position:absolute; right:8px; top:8px; width:auto; height:auto; min-height:0; padding:7px 9px; border-radius:999px; background:rgba(16,19,26,.82); color:#fff; z-index:2; }
    .thumb { height:102px; background:#0e1118; display:flex; align-items:center; justify-content:center; color:#aab2c5; font-size:34px; overflow:hidden; }
    .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .entry-name { padding:10px; overflow-wrap:anywhere; font-size:14px; }
    .entry-meta { padding:0 10px 10px; color:#aab2c5; font-size:12px; }
    .empty { padding:28px; text-align:center; border:1px dashed #394153; border-radius:8px; color:#aab2c5; }
    @media (max-width: 700px) {
      body { margin:18px auto; }
      .topbar { align-items:flex-start; flex-direction:column; }
      .browser-grid { grid-template-columns:repeat(auto-fill, minmax(118px, 1fr)); gap:10px; }
      .thumb { height:88px; }
    }
  </style>
</head>
<body>
  <section id="homeView">
    <div class="topbar">
      <div>
        <h1>Encrypted Folder</h1>
        <p class="muted">Minimal gocryptfs vault manager. Unlock a vault, then browse files and images from this UI or Umbrel File Browser.</p>
      </div>
    </div>

    <div class="card">
      <h2>Create vault</h2>
      <input id="newName" placeholder="vault-name" />
      <span class="password-field">
        <input id="newPass" type="password" placeholder="password, min 8 chars" />
        <button id="toggleNewPass" class="icon-button" type="button" aria-label="Show password" onclick="toggleNewPassword()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </span>
      <button class="primary" onclick="createVault()">Create</button>
    </div>

    <div id="status" class="muted"></div>
    <div id="vaults"></div>
  </section>

  <section id="browserView" class="hidden">
    <div class="topbar">
      <div>
        <h1 id="browserTitle">Files</h1>
        <div id="browserStatus" class="muted"></div>
      </div>
      <button class="secondary" onclick="goHome()">Back to vaults</button>
    </div>
    <div id="breadcrumbs" class="pathbar"></div>
    <div class="browser-controls">
      <button id="slideshowButton" class="primary" type="button" onclick="startSlideshowFromFirst()">Slideshow</button>
    </div>
    <div id="fileGrid" class="browser-grid"></div>
  </section>

<script>
const state = { vault: null, path: '' };
const imageExtensions = /\.(avif|bmp|gif|jpe?g|png|svg|webp)$/i;
window.currentImageCount = 0;
window.galleryLightbox = null;
window.slideshowTimer = null;
window.slideshowRunning = false;
window.slideshowInterval = 3000;

async function api(url, options = {}) {
  const fetchOptions = { ...options };
  if (fetchOptions.body) {
    fetchOptions.headers = { 'content-type': 'application/json', ...fetchOptions.headers };
  }
  const res = await fetch(url, fetchOptions);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[char]));
}

function formatSize(bytes) {
  if (!bytes) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let size = bytes;
  let index = 0;
  while (size >= 1024 && index < units.length - 1) {
    size /= 1024;
    index += 1;
  }
  return `${size.toFixed(index === 0 ? 0 : 1)} ${units[index]}`;
}

function msg(text, cls='muted') {
  document.getElementById('status').innerHTML = `<p class="${cls}">${escapeHtml(text)}</p>`;
}

function browserMsg(text, cls='muted') {
  document.getElementById('browserStatus').innerHTML = `<p class="${cls}">${escapeHtml(text)}</p>`;
}

function togglePassword(inputId, buttonId) {
  const input = document.getElementById(inputId);
  const button = document.getElementById(buttonId);
  const visible = input.type === 'text';
  input.type = visible ? 'password' : 'text';
  button.setAttribute('aria-label', visible ? 'Show password' : 'Hide password');
}

function toggleNewPassword() {
  togglePassword('newPass', 'toggleNewPass');
}

function fileHash(vault, folderPath = '') {
  const params = new URLSearchParams({ vault, path: folderPath });
  return `#files?${params.toString()}`;
}

function umbrelFilesHref(fileBrowserUrl) {
  if (!fileBrowserUrl) return '#';
  return `${location.protocol}//${location.hostname}${fileBrowserUrl}`;
}

function openFolderEncoded(vault, folderPath = '') {
  openFolder(decodeURIComponent(vault), decodeURIComponent(folderPath));
}

function showHome() {
  if (window.stopSlideshow) window.stopSlideshow();
  document.getElementById('homeView').classList.remove('hidden');
  document.getElementById('browserView').classList.add('hidden');
}

function showBrowser() {
  document.getElementById('homeView').classList.add('hidden');
  document.getElementById('browserView').classList.remove('hidden');
}

function goHome() {
  history.pushState(null, '', location.pathname);
  showHome();
  load();
}

function route() {
  const hash = location.hash.slice(1);
  if (!hash.startsWith('files')) {
    showHome();
    load();
    return;
  }
  const query = hash.includes('?') ? hash.slice(hash.indexOf('?') + 1) : '';
  const params = new URLSearchParams(query);
  const vault = params.get('vault');
  const folderPath = params.get('path') || '';
  if (!vault) {
    goHome();
    return;
  }
  openFolder(vault, folderPath, false);
}

async function load() {
  try {
    const data = await api('/api/vaults');
    document.getElementById('vaults').innerHTML = data.vaults.map(v => `
      <div class="card">
        <h2>${escapeHtml(v.name)} ${v.unlocked ? '<span class="ok">unlocked</span>' : '<span class="bad">locked</span>'}</h2>
        <p class="muted">Encrypted: <code>${escapeHtml(v.encryptedPath)}</code></p>
        <p class="muted">Unlocked: <code>${escapeHtml(v.unlockedPath)}</code></p>
        ${v.fileBrowserPath ? `<p class="muted">Umbrel Files: <code>${escapeHtml(v.fileBrowserPath)}</code></p>` : ''}
        ${v.unlocked ? '' : `
          <span class="password-field">
            <input id="pass-${escapeHtml(v.name)}" type="password" placeholder="password" onkeydown="unlockOnEnter(event, '${escapeHtml(v.name)}')" />
            <button id="toggle-pass-${escapeHtml(v.name)}" class="icon-button" type="button" aria-label="Show password" onclick="togglePassword('pass-${escapeHtml(v.name)}', 'toggle-pass-${escapeHtml(v.name)}')">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </span>
          <button class="primary" onclick="unlock('${escapeHtml(v.name)}')">Unlock</button>
        `}
        ${v.unlocked ? `<button class="danger" onclick="lock('${escapeHtml(v.name)}')">Lock</button>` : ''}
        <button class="danger" onclick="deleteVault('${escapeHtml(v.name)}')">Delete</button>
        ${v.unlocked ? `<a class="button secondary" href="${fileHash(v.name)}">Browse</a>` : ''}
        ${v.unlocked && v.fileBrowserUrl ? `<a class="button secondary" href="${escapeHtml(umbrelFilesHref(v.fileBrowserUrl))}" target="_blank" rel="noopener">Open in Umbrel Files</a>` : ''}
      </div>`).join('') || '<div class="card muted">No vaults yet.</div>';
  } catch (e) {
    msg(e.message, 'bad');
  }
}

async function createVault() {
  try {
    await api('/api/vaults', { method:'POST', body: JSON.stringify({ name:newName.value, password:newPass.value }) });
    newName.value = '';
    newPass.value = '';
    msg('Vault created.', 'ok');
    await load();
  } catch(e) {
    msg(e.message, 'bad');
  }
}

async function unlock(name) {
  try {
    await api(`/api/vaults/${encodeURIComponent(name)}/unlock`, {
      method:'POST',
      body: JSON.stringify({ password:document.getElementById(`pass-${name}`).value }),
    });
    msg('Unlocked.', 'ok');
    await load();
  } catch(e) {
    msg(e.message, 'bad');
  }
}

function unlockOnEnter(event, name) {
  if (event.key !== 'Enter') return;
  event.preventDefault();
  unlock(name);
}

async function lock(name) {
  try {
    await api(`/api/vaults/${encodeURIComponent(name)}/lock`, { method:'POST' });
    msg('Locked.', 'ok');
    if (state.vault === name) goHome();
    await load();
  } catch(e) {
    msg(e.message, 'bad');
  }
}

async function deleteVault(name) {
  if (!confirm(`Delete vault "${name}" permanently?`)) return;
  try {
    await api(`/api/vaults/${encodeURIComponent(name)}`, { method:'DELETE' });
    msg('Vault deleted.', 'ok');
    if (state.vault === name) goHome();
    await load();
  } catch(e) {
    msg(e.message, 'bad');
  }
}

function renderBreadcrumbs(vault, folderPath) {
  const parts = folderPath ? folderPath.split('/') : [];
  let current = '';
  const encodedVault = encodeURIComponent(vault);
  const buttons = [`<button onclick="openFolderEncoded('${encodedVault}', '')">${escapeHtml(vault)}</button>`];
  for (const part of parts) {
    current = current ? `${current}/${part}` : part;
    buttons.push(`<span class="muted">/</span><button onclick="openFolderEncoded('${encodedVault}', '${encodeURIComponent(current)}')">${escapeHtml(part)}</button>`);
  }
  document.getElementById('breadcrumbs').innerHTML = buttons.join('');
}

async function openFolder(vault, folderPath = '', updateHash = true) {
  state.vault = vault;
  state.path = folderPath;
  showBrowser();
  document.getElementById('browserTitle').textContent = `Files: ${vault}`;
  browserMsg(folderPath || '/');
  renderBreadcrumbs(vault, folderPath);
  document.getElementById('fileGrid').innerHTML = '<div class="empty">Loading...</div>';
  if (updateHash) history.pushState(null, '', fileHash(vault, folderPath));

  try {
    const url = `/api/vaults/${encodeURIComponent(vault)}/files?path=${encodeURIComponent(folderPath)}`;
    const data = await api(url);
    renderEntries(data.entries);
  } catch (e) {
    browserMsg(e.message, 'bad');
    document.getElementById('fileGrid').innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
  }
}

function renderEntries(entries) {
  if (window.stopSlideshow) window.stopSlideshow();
  if (entries.length === 0) {
    window.currentImageCount = 0;
    document.getElementById('slideshowButton').disabled = true;
    document.getElementById('fileGrid').innerHTML = '<div class="empty">This folder is empty.</div>';
    return;
  }

  const galleryIndex = entries.filter(entry => entry.isImage).map(entry => entry.path);
  window.currentImageCount = galleryIndex.length;
  document.getElementById('slideshowButton').disabled = window.currentImageCount === 0;
  document.getElementById('fileGrid').innerHTML = entries.map(entry => {
    if (entry.type === 'directory') {
      const preview = entry.previewUrl
        ? `<img src="${entry.previewUrl}" loading="lazy" alt="${escapeHtml(entry.name)} preview" />`
        : 'Folder';
      return `
        <div class="entry">
          <button onclick="openFolderEncoded('${encodeURIComponent(state.vault)}', '${encodeURIComponent(entry.path)}')">
            <div class="thumb">${preview}</div>
            <div class="entry-name">${escapeHtml(entry.name)}</div>
            <div class="entry-meta">Folder</div>
          </button>
        </div>`;
    }

    if (entry.isImage) {
      const index = galleryIndex.indexOf(entry.path);
      return `
        <div class="entry">
          <button class="play-from" type="button" title="Start slideshow from this image" onclick="startSlideshowFrom(${index})">Play</button>
          <a href="${entry.url}" class="gallery-image" data-index="${index}" data-pswp-width="1600" data-pswp-height="1200">
            <div class="thumb"><img src="${entry.url}" loading="lazy" alt="${escapeHtml(entry.name)}" onload="setPhotoSize(this)" /></div>
            <div class="entry-name">${escapeHtml(entry.name)}</div>
            <div class="entry-meta">${formatSize(entry.size)}</div>
          </a>
        </div>`;
    }

    return `
      <div class="entry">
        <a href="${entry.url}" target="_blank" rel="noopener">
          <div class="thumb">File</div>
          <div class="entry-name">${escapeHtml(entry.name)}</div>
          <div class="entry-meta">${formatSize(entry.size)}</div>
        </a>
      </div>`;
  }).join('');

  if (window.attachGallery) window.attachGallery();
}

function setPhotoSize(img) {
  const anchor = img.closest('a');
  if (!anchor || !img.naturalWidth || !img.naturalHeight) return;
  anchor.dataset.pswpWidth = String(img.naturalWidth);
  anchor.dataset.pswpHeight = String(img.naturalHeight);
}

function slideshowIntervalMs() {
  return Number(document.getElementById('pswpSlideshowInterval')?.value || window.slideshowInterval || 3000);
}

function updateSlideshowButtons() {
  document.querySelectorAll('[data-slideshow-toggle]').forEach(button => {
    button.textContent = window.slideshowRunning ? 'Pause' : 'Play';
    button.setAttribute('aria-label', window.slideshowRunning ? 'Pause slideshow' : 'Start slideshow');
  });
  const button = document.getElementById('slideshowButton');
  if (button) button.textContent = window.slideshowRunning ? 'Stop' : 'Slideshow';
}

window.stopSlideshow = function stopSlideshow() {
  if (window.slideshowTimer) clearInterval(window.slideshowTimer);
  window.slideshowTimer = null;
  window.slideshowRunning = false;
  updateSlideshowButtons();
};

function playSlideshow() {
  window.stopSlideshow();
  const pswp = window.galleryLightbox?.pswp;
  if (!pswp || window.currentImageCount < 1) return;
  window.slideshowRunning = true;
  window.slideshowTimer = setInterval(() => {
    if (!window.galleryLightbox?.pswp) {
      window.stopSlideshow();
      return;
    }
    window.galleryLightbox.pswp.next();
  }, slideshowIntervalMs());
  updateSlideshowButtons();
}

window.startSlideshowFrom = function startSlideshowFrom(index) {
  const images = Array.from(document.querySelectorAll('a.gallery-image'));
  if (!images.length) return;
  const image = images[Math.max(0, Math.min(index, images.length - 1))];
  image.click();
  setTimeout(playSlideshow, 150);
};

window.startSlideshowFromFirst = function startSlideshowFromFirst() {
  if (window.slideshowRunning) {
    window.stopSlideshow();
    return;
  }
  window.startSlideshowFrom(0);
};

window.addEventListener('hashchange', route);
route();
</script>
<script type="module">
try {
  const [{ default: PhotoSwipeLightbox }, { default: PhotoSwipe }] = await Promise.all([
    import('https://unpkg.com/photoswipe@5/dist/photoswipe-lightbox.esm.js'),
    import('https://unpkg.com/photoswipe@5/dist/photoswipe.esm.js'),
  ]);

  window.attachGallery = function attachGallery() {
    if (window.galleryLightbox) window.galleryLightbox.destroy();
    window.stopSlideshow();
  window.galleryLightbox = new PhotoSwipeLightbox({
      gallery: '#fileGrid',
      children: 'a.gallery-image',
      loop: true,
      pswpModule: PhotoSwipe,
    });
    window.galleryLightbox.on('afterInit', () => {
      const controls = document.createElement('div');
      controls.className = 'pswp__slideshow-controls';
      controls.innerHTML = `
        <button type="button" data-slideshow-toggle>Play</button>
        <label for="pswpSlideshowInterval">Interval</label>
        <select id="pswpSlideshowInterval">
          <option value="2000">2 sec</option>
          <option value="3000">3 sec</option>
          <option value="5000">5 sec</option>
          <option value="8000">8 sec</option>
          <option value="10000">10 sec</option>
        </select>
      `;
      const select = controls.querySelector('select');
      select.value = String(window.slideshowInterval || 3000);
      select.addEventListener('change', () => {
        window.slideshowInterval = Number(select.value);
        if (window.slideshowRunning) playSlideshow();
      });
      controls.querySelector('[data-slideshow-toggle]').addEventListener('click', () => {
        if (window.slideshowRunning) window.stopSlideshow();
        else playSlideshow();
      });
      window.galleryLightbox.pswp.element.appendChild(controls);
      updateSlideshowButtons();
    });
    window.galleryLightbox.on('close', () => window.stopSlideshow());
    window.galleryLightbox.init();
    updateSlideshowButtons();
  };
  if (document.querySelector('a.gallery-image')) window.attachGallery();
} catch (error) {
  console.error('PhotoSwipe failed to load', error);
}
</script>
</body>
</html>
